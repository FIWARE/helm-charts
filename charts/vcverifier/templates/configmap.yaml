{{/*
Chart-local ConfigMap (server.yaml configuration payload): intentionally
not migrated. This ConfigMap renders the chart-specific verifier
configuration (server, m2m, logging, verifier, configRepo, elsi blocks)
and is not part of the common helper surface. See
charts/vcverifier/CHANGELOG.md for details.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vcverifier.fullname" . }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "vcverifier.labels" . | nindent 4 }}
data:
  server.yaml: |-
    server:
      {{- with .Values.deployment.server }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

    m2m:
      {{- with .Values.deployment.m2m }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

    logging:
      {{- with .Values.deployment.logging }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

    verifier:
      {{- with .Values.deployment.verifier }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

    configRepo:
      {{- with .Values.deployment.configRepo }}
      {{- toYaml . | nindent 6 }}
      {{- end }}

    elsi:
      {{- with .Values.deployment.elsi }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
