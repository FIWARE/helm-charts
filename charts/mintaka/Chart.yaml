apiVersion: v2
name: mintaka
version: 0.4.5
appVersion: 0.0.5
kubeVersion: '>= 1.19-0'
description: A Helm chart for running mintaka on kubernetes.
icon: https://fiware.github.io/catalogue/img/fiware.png
keywords:
  - fiware
  - orion
  - orion-ld
  - mintaka
sources:
  - https://github.com/fiware/mintaka
maintainers:
  - name: wistefan
    email: stefan.wiedemann@seamware.com
# The `common` library chart ships every shared helper
# (names, labels, service-account resolution, existing-secret
# resolution, service/ingress/route/HPA/secret/serviceaccount
# bodies). It is consumed via a local `file://` dependency so
# publishing workflows do not need a separate repository entry —
# Helm packages the library alongside mintaka in the resulting
# `mintaka-<version>.tgz`. See charts/common/README.md.
dependencies:
  - name: common
    repository: "file://../common"
    version: "0.0.1"
