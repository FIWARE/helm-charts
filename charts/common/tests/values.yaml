# Deterministic values for the common-tests fixture chart. These values
# are chosen so the rendered helper outputs can be asserted exactly
# against golden files in `charts/common/tests/expected/`.
#
# The fixture exists only to prove that the `fiwareCommon.*` helpers produce
# output byte-identical (modulo whitespace tolerated by kubeconform) to
# the canonical orion/keyrock/mintaka helpers. It is not published.

nameOverride: ""
fullnameOverride: ""
namespaceOverride: ""

# Service-account block — consumed by fiwareCommon.serviceAccount.name and
# fiwareCommon.serviceAccount.tpl. Exercises both branches (`create: true`
# default, `create: false`, and the `.name` override) via separate keys
# in parity.yaml and resources.yaml below.
serviceAccount:
  create: true
  name: ""
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::000000000000:role/common-tests

# Image block — consumed by fiwareCommon.images.{image,pullPolicy}. The
# fixture chart's .Chart.AppVersion is "1.0.1" so `tag: ""` verifies
# the AppVersion fallback matches the legacy
# `.Values.image.tag | default .Chart.AppVersion` idiom.
image:
  repository: quay.io/fiware/common-tests
  tag: ""
  pullPolicy: ""

# Image block with every field explicitly set — verifies the helpers
# do not override caller-supplied values.
imagePinned:
  repository: quay.io/fiware/common-tests
  tag: "2.0.0"
  pullPolicy: "Always"

# Pull-secrets — consumed by fiwareCommon.images.pullSecrets. A mix of the
# two accepted shapes (bare string + map) so the normalisation path is
# exercised.
imagePullSecrets:
  - name: registry-a
  - registry-b

# Secret inputs — consumed by fiwareCommon.secrets.{name,key} and
# fiwareCommon.secret.tpl. The keys mirror the two idioms in the codebase:
#   * keyrockStyle  — `.Values.existingSecret` is a plain string
#   * keyrockCert   — same shape, exercised with suffix="-certs"
#   * orionStyle    — `.Values.broker.db.existingSecret` is a map
#                     with optional `.name` and `.key`
#   * orionNoName   — orion-style map without `.name` (falls back)
#   * orionDefaults - orion-style absent (nil) → falls back
existingSecret: "my-keyrock-secret"
existingCertSecret: "my-keyrock-cert-secret"
broker:
  db:
    existingSecret:
      name: "my-orion-db-secret"
      key: "myDbPasswordKey"
brokerNoName:
  db:
    existingSecret:
      key: "myDbPasswordKey"
brokerDefaults:
  db: {}

# Password material used by fiwareCommon.secret.tpl. The `brokerDefaults`
# branch has no existingSecret set, so the helper must render a real
# Secret object; base64-encoded "secret-password" is the expected
# ciphertext.
brokerSecretData:
  dbPassword: "secret-password"

# Service block — consumed by fiwareCommon.service.tpl. Matches the orion
# service.yaml shape (type, port, targetPort via .broker.port).
service:
  type: ClusterIP
  port: 1026
  annotations:
    service.beta.kubernetes.io/topology-aware-hints: auto
brokerTargetPort: 1026

# Ingress block — consumed by fiwareCommon.ingress.tpl. `enabled: true` so
# the helper renders a full Ingress manifest. Matches the orion/mintaka
# shape (hosts with paths list, tls list, annotations map).
ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: fiwareCommon.example.org
      paths:
        - /
  tls:
    - hosts:
        - fiwareCommon.example.org
      secretName: common-tls

# Route block — consumed by fiwareCommon.route.tpl. `enabled: true` so the
# helper renders a full OpenShift Route manifest.
route:
  enabled: true
  host: fiwareCommon.apps.example.org
  annotations:
    haproxy.router.openshift.io/timeout: 30s
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect

# Autoscaling block — consumed by fiwareCommon.hpa.tpl. `enabled: true` so
# the helper renders an HPA manifest. `apiVersion` exercises the
# interpolated autoscaling/<version> path used by orion/mintaka today.
autoscaling:
  enabled: true
  apiVersion: v2
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
