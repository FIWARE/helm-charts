apiVersion: v2
name: fdsc-edc
version: 0.2.0
appVersion: 0.1.7
description: A Helm chart for running the fdsc-edc on kubernetes.
icon: https://fiware.github.io/catalogue/img/fiware.png
keywords:
  - fiware
  - data-space-connector
  - dataspace
  - dataspace-protocol
sources:
  - https://github.com/SEAMWARE/fdsc-edc
maintainers:
  - name: wistefan
    email: stefan.wiedemann@seamware.org
# The `common` library chart ships every shared helper
# (names, labels, service-account resolution, existing-secret
# resolution, service/ingress/route/HPA/secret/serviceaccount
# bodies). It is consumed via a local `file://` dependency so
# publishing workflows do not need a separate repository entry —
# Helm packages the library alongside fdsc-edc in the resulting
# `fdsc-edc-<version>.tgz`. See charts/common/README.md.
dependencies:
  - name: common
    repository: "file://../common"
    version: ">=0.0.1"
