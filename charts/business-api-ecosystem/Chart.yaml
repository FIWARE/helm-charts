apiVersion: v2
name: business-api-ecosystem
description: A Helm chart for running the FIWARE business API ecosystem (FIWARE Marketplace) on Kubernetes
icon: https://fiware.github.io/catalogue/img/fiware.png
version: 0.11.27
appVersion: 9.0.1
home: https://business-api-ecosystem.readthedocs.io/en/latest/
keywords:
  - fiware
  - marketplace
  - bae
  - tmforum
sources:
  - https://github.com/FIWARE-TMForum/Business-API-Ecosystem
maintainers:
  - name: dwendland
    email: dennis.wendland@fiware.org
  - name: wistefan
    email: stefan.wiedemann@seamware.com
# The `common` library chart ships every shared helper
# (names, labels, service-account resolution, existing-secret
# resolution, service/ingress/route/HPA/secret/serviceaccount
# bodies). It is consumed via a local `file://` dependency so
# publishing workflows do not need a separate repository entry —
# Helm packages the library alongside business-api-ecosystem in
# the resulting `business-api-ecosystem-<version>.tgz`.
# See charts/common/README.md.
dependencies:
  - name: common
    repository: "https://fiware.github.io/helm-charts"
    version: "0..0"
