{{- /*
Gated on `.Values.db.existingSecret.enabled` to preserve the chart's
legacy "enabled bool + default name/key" values.yaml shape: when
`enabled` is false (the default) the chart renders its own Secret and
ignores the placeholder `name: the-secret` shipped in values.yaml.
When `enabled` is true the chart skips rendering and the Deployment
references the user-supplied Secret via
`scorpioBroker-aaio.secretName` / `.passwordKey`.
*/ -}}
{{- if not .Values.db.existingSecret.enabled }}
{{- include "fiwareCommon.secret.tpl" (dict
      "context" $
      "data"    (dict "password" .Values.db.password)) }}
{{- end }}
