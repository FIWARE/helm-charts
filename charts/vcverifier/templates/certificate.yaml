{{/*
Chart-local cert-manager.io/v1 Certificate: intentionally not migrated.
Certificate CRs are not part of the common helper surface (same as
charts/keyrock/templates/certificate.yaml and
charts/ishare-satellite/templates/certificate.yaml, which also stay
chart-local). See charts/vcverifier/CHANGELOG.md for details.
*/}}
{{- if .Values.route.certificate -}}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "vcverifier.fullname" . }}
  labels:
    {{ include "vcverifier.labels" . | nindent 4 }}
spec:
  secretName: {{ include "vcverifier.fullname" . }}-tls-sec
  issuerRef:
    {{- toYaml .Values.route.certificate.issuer | nindent 4 }}
  commonName: {{ .Values.route.host }}
  dnsNames:
    - {{ .Values.route.host }}
{{- end -}}