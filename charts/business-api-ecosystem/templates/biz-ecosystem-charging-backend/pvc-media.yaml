{{- if .Values.bizEcosystemChargingBackend.media.enabled }}
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ include "bizEcosystemChargingBackend.fullname" . }}-media-assets
  namespace: {{ $.Release.Namespace | quote }}
  {{- with .Values.bizEcosystemChargingBackend.media.annotations  }}
  annotations:
  {{ toYaml . | indent 4 }}
  {{- end }}
  labels:
    {{- include "bizEcosystemChargingBackend.labels" . | nindent 4 }}
spec:
  {{- if .Values.bizEcosystemChargingBackend.media.storageClass }}
  storageClassName: {{ .Values.bizEcosystemChargingBackend.media.storageClass | quote }}
  {{- end }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.bizEcosystemChargingBackend.media.size | quote }}
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: {{ include "bizEcosystemChargingBackend.fullname" . }}-media-bills
  {{- with .Values.bizEcosystemChargingBackend.media.annotations  }}
  annotations:
  {{ toYaml . | indent 4 }}
  {{- end }}
  labels:
    {{- include "bizEcosystemChargingBackend.labels" . | nindent 4 }}
spec:
  {{- if .Values.bizEcosystemChargingBackend.media.storageClass }}
  storageClassName: {{ .Values.bizEcosystemChargingBackend.media.storageClass | quote }}
  {{- end }}
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.bizEcosystemChargingBackend.media.size | quote }}
{{- end }}
