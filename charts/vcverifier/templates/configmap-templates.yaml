{{/*
Chart-local ConfigMap (<fullname>-template, gated on .Values.templates):
intentionally not migrated. This ConfigMap ships the vcverifier HTML /
template payload and is not part of the common helper surface. See
charts/vcverifier/CHANGELOG.md for details.
*/}}
{{- if .Values.templates }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vcverifier.fullname" . }}-template
  labels:
    {{- include "vcverifier.labels" . | nindent 4 }}
data:
  {{- with .Values.templates }}
    {{- toYaml . | nindent 2 }}
  {{- end }}
{{- end }}