{{- if .Values.gateway.enabled }}
{{- /*
The top-level `gateway.service` values block describes the NodePort
variant rendered by `scorpio-gateway-node-port-svc.yaml` (Step 3). The
ClusterIP Service below reuses the same `port` value but forces
`type: ClusterIP` so in-cluster traffic bypasses the NodePort path.
*/}}
{{- include "common.service.tpl" (dict
      "context" $
      "component" .Values.gateway.name
      "service" (dict "type" "ClusterIP")
      "ports"   (list (dict
                        "port" .Values.gateway.service.port
                        "name" (quote .Values.gateway.service.port)))) }}
{{- end }}
