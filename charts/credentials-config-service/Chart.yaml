apiVersion: v2
name: credentials-config-service
version: 2.6.0
appVersion: 3.4.2
kubeVersion: '>= 1.19-0'
description: A Helm chart for running the credentials-config-service on kubernetes.
icon: https://fiware.github.io/catalogue/img/fiware.png
keywords:
  - FIWARE
  - credentials-config-service
  - DSBA
  - VerifiableCredentials
  - IAM
sources:
  - https://github.com/fiware/credentials-config-service
maintainers:
  - name: wistefan
    email: stefan.wiedemann@fiware.org
# The `common` library chart ships every shared helper
# (names, labels, service-account resolution, existing-secret
# resolution, service/ingress/HPA/secret/serviceaccount bodies)
# used across the FIWARE helm-charts monorepo. It is published
# from this repository to the same Helm repository index, so
# `helm dependency update` resolves it from there. See
# charts/common/README.md.
dependencies:
  - name: common
    repository: "https://fiware.github.io/helm-charts"
    version: "0.0.1"
