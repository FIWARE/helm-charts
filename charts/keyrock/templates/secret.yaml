{{- /*
Keyrock credentials Secret.

`fiwareCommon.secret.tpl` is a no-op when `existingSecret` is supplied, so the
consumer continues to reference whatever secret name `keyrock.secretName`
resolves to.
*/ -}}
{{- $adminPassword := .Values.admin.password | default (randAlphaNum 10) -}}
{{- include "fiwareCommon.secret.tpl" (dict
      "context"        $
      "existingSecret" .Values.existingSecret
      "data"           (dict
                          "dbPassword"    .Values.db.password
                          "adminPassword" $adminPassword)) }}
{{- if .Values.token.enabled }}
---
{{- /*
Keyrock certificate Secret (token.key / token.cert).

Gated on `.Values.token.enabled` by the outer `if`; `fiwareCommon.secret.tpl`
additionally suppresses rendering when `existingCertSecret` is supplied,
matching the legacy body.
*/ -}}
{{- include "fiwareCommon.secret.tpl" (dict
      "context"        $
      "existingSecret" .Values.existingCertSecret
      "suffix"         "-certs"
      "data"           (dict
                          "key"  .Values.token.key
                          "cert" .Values.token.cert)) }}
{{- end }}
