{{- if .Values.eureka.enabled }}
{{- /*
The top-level `eureka.service` values block describes the NodePort
variant rendered by `eureka-node-port.yaml` (Step 3). The ClusterIP
Service below reuses the same `port` value but forces `type: ClusterIP`
so in-cluster traffic bypasses the NodePort path.
*/}}
{{- include "fiwareCommon.service.tpl" (dict
      "context" $
      "component" .Values.eureka.name
      "service" (dict "type" "ClusterIP")
      "ports"   (list (dict
                        "port" .Values.eureka.service.port
                        "name" (quote .Values.eureka.service.port)))) }}
{{- end }}
