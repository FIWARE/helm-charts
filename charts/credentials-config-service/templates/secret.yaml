{{- /*
credentials-config-service database credentials Secret.

The chart uses an opt-in `.Values.database.existingSecret.enabled`
flag (distinct from the bare-string / map-with-name shapes that
`fiwareCommon.secret.tpl` understands out of the box). We pass the map
through to the helper only when `enabled` is true — that makes the
helper a no-op (user-supplied secret) and the consumer continues to
reference whatever `ccs.secretName` resolves to. When `enabled` is
false the helper renders the body exactly as the legacy
`templates/secret.yaml` did, keyed under `password`.
*/ -}}
{{- $existing := "" -}}
{{- if .Values.database.existingSecret.enabled -}}
{{- $existing = .Values.database.existingSecret -}}
{{- end -}}
{{- include "fiwareCommon.secret.tpl" (dict
      "context"        $
      "existingSecret" $existing
      "data"           (dict "password" .Values.database.password)) }}
