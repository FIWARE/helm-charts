{{- if and (eq .Values.registration.enabled true) (.Values.registration) }}

apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "vcverifier.fullname" . }}-registration
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{ include "vcverifier.labels" . | nindent 4 }}
data:
  init.sh: |-
    set -e

    log() {
      level="$1"
      msg="$2"
      ts=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      echo "[${level}] ${ts} ${msg}"
    }

    register_service() {
      id="$1"
      body="$2"

      log "INFO" "Registering service '${id}' at ${HOST}/service"
      body_file=$(mktemp)
      http_code=$(curl -s -o "${body_file}" -w "%{http_code}" \
        -X POST "${HOST}/service" \
        -H 'accept: */*' \
        -H 'Content-Type: application/json' \
        -d "${body}" || echo "000")

      log "INFO" "POST ${HOST}/service [${id}] -> HTTP ${http_code}"

      if [ "${http_code}" = "409" ]; then
        log "WARN" "Service '${id}' already exists, skipping"
      elif [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
        log "ERROR" "Registration of '${id}' failed with HTTP ${http_code}"
        echo "$(cat "${body_file}")"
        rm -f "${body_file}"
        exit 1
      fi
      rm -f "${body_file}"
    }
    {{- if .Values.registration.prepScript }}

    {{ .Values.registration.prepScript }}
    {{- end }}

    {{- if .Values.registration.host }}
    HOST="{{ .Values.registration.host | trimSuffix "/" }}"
    {{- else if .Values.deployment.configServer.enabled }}
    HOST="http://{{ include "fiwareCommon.names.fullname" (dict "context" $) }}:{{ .Values.deployment.configServer.port }}"
    {{- else }}
    HOST="{{ .Values.deployment.configRepo.configEndpoint | trimSuffix "/" }}"
    {{- end }}
    {{- range .Values.registration.services }}
    {{- $body := dict "id" .id "defaultOidcScope" .defaultOidcScope "oidcScopes" .oidcScopes }}
    {{- if .authorizationType }}
    {{- $_ := set $body "authorizationType" .authorizationType }}
    {{- end }}

    register_service "{{ .id }}" '{{ $body | toJson }}'
    {{- end }}

{{- end }}