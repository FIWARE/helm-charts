{{- if .Values.gateway.enabled }}
{{- /*
NodePort-variant companion to `gateway-service.yaml`. The legacy name
`scorpio-gateway-service` is hard-coded (no include) and is not produced
by `common.names.fullname`, so it is supplied via `nameOverride`. The
`nodePort` key is rendered verbatim by `common.service.tpl`: when
`type` is switched to `ClusterIP` the caller can still pass
`"nodePort" nil` to drop the previously-assigned node port, matching
the pre-migration `nodePort: null` behaviour.
*/}}
{{- $port := dict "port" .Values.gateway.service.port "name" (quote .Values.gateway.service.port) -}}
{{- if and (eq .Values.gateway.service.type "NodePort") .Values.gateway.service.nodePort -}}
{{- $_ := set $port "nodePort" .Values.gateway.service.nodePort -}}
{{- else if eq .Values.gateway.service.type "ClusterIP" -}}
{{- $_ := set $port "nodePort" nil -}}
{{- end -}}
{{- include "common.service.tpl" (dict
      "context" $
      "component" .Values.gateway.name
      "nameOverride" "scorpio-gateway-service"
      "service" .Values.gateway.service
      "ports"   (list $port)) }}
{{- end }}
