apiVersion: v2
name: contract-management
version: 3.5.23
appVersion: 3.3.8
kubeVersion: '>= 1.19-0'
description: A Helm chart for running the contract-management on kubernetes.
icon: https://fiware.github.io/catalogue/img/fiware.png
keywords:
  - FIWARE
  - contract-management
  - DSBA
  - VerifiableCredentials
  - IAM
sources:
  - https://github.com/fiware/contract-management
maintainers:
  - name: pulledtim
    email: tim.smyth@fiware.org
  - name: wistefan
    email: stefan.wiedemann@seamware.com
# The `common` library chart ships every shared helper
# (names, labels, service-account resolution, existing-secret
# resolution, service/ingress/route/HPA/secret/serviceaccount
# bodies). It is consumed via a local `file://` dependency so
# publishing workflows do not need a separate repository entry —
# Helm packages the library alongside contract-management in the
# resulting `contract-management-<version>.tgz`. See
# charts/common/README.md.
dependencies:
  - name: common
    repository: "https://fiware.github.io/helm-charts"
    version: "0.0.1"
