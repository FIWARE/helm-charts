{{/*
Chart-local Deployment: intentionally not migrated to the common library
chart. The container / env / probe / volume body (CA-bundle init
container, signing-cert and client-cert volumes, templates ConfigMap
mount, static volume) is chart-specific and has no counterpart in the
common helper surface. See charts/vcverifier/CHANGELOG.md for the full
"Common library chart migration" rationale.
*/}}
kind: Deployment
apiVersion: apps/v1
metadata:
  name: {{ include "vcverifier.fullname" . }}
  namespace: {{ $.Release.Namespace | quote }}
  labels:
    {{- include "vcverifier.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.deployment.replicaCount }}
  revisionHistoryLimit: {{ .Values.deployment.revisionHistoryLimit }}
  strategy:
  {{- with .Values.deployment.updateStrategy }}
  {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "vcverifier.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "vcverifier.labels" . | nindent 8 }}
        {{- with .Values.deployment.additionalLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- if .Values.deployment.additionalAnnotations -}}
      annotations:
        {{- with .Values.deployment.additionalAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "vcverifier.serviceAccountName" . }}
      {{- if .Values.deployment.hostAliases }}
      hostAliases:
        {{- with .Values.deployment.hostAliases }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- if .Values.deployment.initContainers }}
      initContainers:
        {{- if .Values.deployment.serverCertificates.caCert.enabled}}
        {{- with .Values.deployment.serverCertificates.caCert }}
        - name: add-root-ca
          image: {{ .bundleImage.repository }}:{{ .bundleImage.tag }}
          command: ["sh", "-c", "cat {{.bundleImage.bundlePath }} /tmp/ca.crt > /root-ca/cert.pem"]
          volumeMounts:
            - name: ca-bundle
              mountPath: /root-ca
            - name: custom-ca-volume
              mountPath: /tmp/ca.crt
              subPath: {{ .key }}
        {{- end }}
        {{- end }}
        {{- with .Values.deployment.initContainers }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.deployment.image.repository }}:{{ .Values.deployment.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.deployment.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.deployment.port }}
              name: backend
          env:
          {{- if .Values.deployment.alternativeConfig }}
            - name: CONFIG_FILE
              value: {{ .Values.deployment.alternativeConfig }}
          {{- else }}
            - name: CONFIG_FILE
              value: /configs/server.yaml
          {{- end }}
          {{- if .Values.deployment.additionalEnvVars }}
            {{- with .Values.deployment.additionalEnvVars }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- end }}
          livenessProbe:
            httpGet:
              path: /health
              port: backend
            initialDelaySeconds: {{ .Values.deployment.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.deployment.livenessProbe.periodSeconds }}
            successThreshold: {{ .Values.deployment.livenessProbe.successThreshold }}
            failureThreshold: {{ .Values.deployment.livenessProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.deployment.livenessProbe.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /health
              port: backend
            initialDelaySeconds: {{ .Values.deployment.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.deployment.readinessProbe.periodSeconds }}
            successThreshold: {{ .Values.deployment.readinessProbe.successThreshold }}
            failureThreshold: {{ .Values.deployment.readinessProbe.failureThreshold }}
            timeoutSeconds: {{ .Values.deployment.readinessProbe.timeoutSeconds }}
          resources:
            {{- toYaml .Values.deployment.resources | nindent 12 }}
          ## workaround for missing db support
          volumeMounts:
            - mountPath: /configs/
              name: config-volume
            {{- if and .Values.deployment.serverCertificates.signingKey.secretName .Values.deployment.verifier.keyPath }}
            - mountPath: {{ .Values.deployment.verifier.keyPath }}
              name: signing-certs-volume
              subPath: {{ .Values.deployment.serverCertificates.signingKey.key }}
            {{- end }}
            {{- if and .Values.deployment.serverCertificates.clientKey.secretName }}
            {{- if .Values.deployment.verifier.clientIdentification.keyPath }}
            - mountPath: {{ .Values.deployment.verifier.clientIdentification.keyPath }}
              name: certs-volume
              subPath: {{ .Values.deployment.serverCertificates.clientKey.privateKey }}
            {{- end }}
            {{- if .Values.deployment.verifier.clientIdentification.certificatePath }}
            - mountPath: {{ .Values.deployment.verifier.clientIdentification.certificatePath }}
              name: certs-volume
              subPath: {{ .Values.deployment.serverCertificates.clientKey.publicKey }}
            - name: ca-bundle
              mountPath: /etc/ssl/cert.pem
              subPath: cert.pem
            {{- end }}
            {{- end }}
            {{- if .Values.templates }}
            - mountPath: /templates/
              name: template-volume
            {{- end }}
            {{- if .Values.static.enabled }}
            - mountPath: /static/
              name: static-volume
            {{- end }}
            {{- if .Values.deployment.additionalVolumeMounts }}
            {{- with .Values.deployment.additionalVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- end }}
      volumes:
      - name: config-volume
        configMap:
          name: {{ include "vcverifier.fullname" . }}
      {{- if .Values.deployment.serverCertificates.caCert.enabled }}
      - name: custom-ca-volume
        secret:
          secretName: {{ .Values.deployment.serverCertificates.caCert.secretName }}
      - name: ca-bundle
        emptyDir: {}
      {{- end }}
      {{- if .Values.deployment.serverCertificates.signingKey.secretName  }}
      - name: signing-certs-volume
        secret:
          secretName: {{ .Values.deployment.serverCertificates.signingKey.secretName }}
      {{- end }}
      {{- if .Values.deployment.serverCertificates.clientKey.secretName  }}
      - name: certs-volume
        secret:
          secretName: {{ .Values.deployment.serverCertificates.clientKey.secretName }}
      {{- end }}
      {{- if .Values.deployment.additionalVolumes }}
      {{- with .Values.deployment.additionalVolumes }}
      {{- toYaml . | nindent 6 }}
      {{- end }}
      {{- end }}
      {{- if .Values.templates }}
      - name: template-volume
        configMap:
          name: {{ include "vcverifier.fullname" . }}-template
      {{- end }}
      {{- if .Values.static.enabled }}
      - name: static-volume
        emptyDir:
          sizeLimit: 500Mi
      {{- end }}
      {{- with .Values.deployment.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.deployment.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
