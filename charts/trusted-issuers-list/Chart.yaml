apiVersion: v2
name: trusted-issuers-list
version: 0.18.0
appVersion: 0.8.1
description: A Helm chart for running the trusted-issuers-list on kubernetes.
icon: https://fiware.github.io/catalogue/img/fiware.png
keywords:
  - FIWARE
  - trusted-issuers-list
  - DSBA
  - VerifiableCredentials
  - IAM
sources:
  - https://github.com/fiware/trusted-issuers-list
maintainers:
  - name: wistefan
    email: stefan.wiedemann@fiware.org
# The `common` library chart ships every shared helper
# (names, labels, service-account resolution, existing-secret
# resolution, service/ingress/route/HPA/secret/serviceaccount
# bodies). It is consumed via a local `file://` dependency so
# publishing workflows do not need a separate repository entry —
# Helm packages the library alongside trusted-issuers-list in the
# resulting `trusted-issuers-list-<version>.tgz`. See
# charts/common/README.md.
dependencies:
  - name: common
    repository: "file://../common"
    version: "0.0.2"
