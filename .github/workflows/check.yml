name: Chart Test
env:
  HELM_VERSION: "4.0.4"
on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
    branches:
      - main

jobs:

  # lint the charts
  lint:

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - uses: azure/setup-helm@v4
        with:
          version: '${{ env.HELM_VERSION }}'

      - name: Update charts dependencies
        run: ./build.sh

      - name: Lint
        run: ./lint.sh

  eval:

    runs-on: ubuntu-latest
    needs:
      - lint

    steps:
      - uses: actions/checkout@v2

      - uses: azure/setup-helm@v4
        with:
          version: '${{ env.HELM_VERSION }}'

      - name: Update charts dependencies
        run: ./build.sh

      - name: Eval
        run: |
          .github/build/install-kubeconform.sh
          ./eval.sh

  # Render the `common` library chart's fixture consumer and diff the
  # output against the committed golden files under
  # charts/common/tests/expected/. Any drift in a `common.*` helper —
  # intended or accidental — is caught here before it can propagate to
  # the per-chart migrations. See scripts/test-common.sh for details.
  common-tests:

    runs-on: ubuntu-latest
    needs:
      - lint

    steps:
      - uses: actions/checkout@v2

      - uses: azure/setup-helm@v4
        with:
          version: '${{ env.HELM_VERSION }}'

      - name: Render fixture and diff against golden files
        run: bash scripts/test-common.sh

  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2

      - uses: actions/setup-java@v1
        with:
          java-version: '11'
          java-package: jdk

      - id: bump
        uses: zwaldowski/match-label-action@v1
        with:
          allowed: major,minor,patch

  prepare-release:
    needs: ["check"]

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Check if already bumped
        id: already-bumped
        run: |
          if git log --oneline | grep -q "Update helm documentation"; then
            echo Bumped
            echo "bumped=true" >> $GITHUB_OUTPUT
          else
            echo Not bumped
            echo "bumped=false" >> $GITHUB_OUTPUT
          fi
          
      - id: bump
        uses: zwaldowski/match-label-action@v4
        with:
          allowed: major,minor,patch

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v14.6


      # prepare yaml parser
      - uses: actions/setup-go@v4
      - name: Install yq
        run: |
          go install github.com/mikefarah/yq/v4@latest
          echo "$(go env GOPATH)/bin" >> $GITHUB_PATH

      - uses: actions/checkout@v3
        with:
          ref: ${{ github.head_ref }}

      - name: Collect changed charts
        id: charts
        shell: bash
        run: |
          declare -A changedCharts
          for file in ${{ steps.changed-files.outputs.all_changed_and_modified_files }}; do
            baseFolder=$(cut -d'/' -f1 <<< "$file")
            if [ "$baseFolder" = "charts" ]; then
              chartName=$(cut -d'/' -f2 <<< "$file")
              changedCharts[$chartName]=$chartName
            fi
          done
          CHARTS=""
          for c in "${changedCharts[@]}"; do
            CHARTS="$CHARTS $c"
          done
          echo "list=${CHARTS# }" >> $GITHUB_OUTPUT

      - name: Bump chart versions
        if: steps.charts.outputs.list != '' && steps.already-bumped.outputs.bumped == 'false'
        uses: ./.github/actions/bump-chart-version
        with:
          charts: ${{ steps.charts.outputs.list }}
          bump-type: ${{ steps.bump.outputs.match }}

      - name: Commit files
        continue-on-error: true
        run: |
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git status
          echo commit
          git commit -m "Update helm documentation" -a
          echo status update
          git status

      - name: Push changes
        continue-on-error: true
        uses: ad-m/github-push-action@master
        with:
          branch: ${{ github.head_ref }}
